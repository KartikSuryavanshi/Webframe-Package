[tox]
# Test environments for multiple Python versions and code quality checks
envlist = py{37,38,39,310,311,312}, flake8, mypy
isolated_build = True
skip_missing_interpreters = True

[testenv]
# Default test environment configuration
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    ipython>=7.0.0
commands =
    pytest {posargs}

[testenv:flake8]
deps =
    flake8>=6.0.0
commands =
    flake8 webframe tests

[testenv:mypy]
deps =
    mypy>=1.0.0
    ipython>=7.0.0
commands =
    mypy webframe

[testenv:black]
deps =
    black>=23.0.0
commands =
    black --check webframe tests

[testenv:coverage]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    ipython>=7.0.0
commands =
    pytest --cov=webframe --cov-report=term-missing --cov-report=html

[testenv:dev]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    flake8>=6.0.0
    mypy>=1.0.0
    black>=23.0.0
    ipython>=7.0.0
commands =
    pytest
    flake8 webframe tests
    mypy webframe
